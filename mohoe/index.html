<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mohoe Coffee">
    <title>Mohoe Coffee Drinking Map</title>
    <meta name="description" content="Tracking every Mojo coffee location in New Zealand — 10 visited, 15 to go.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        #map {
            flex: 1;
            z-index: 1;
            min-height: 0;
        }
        .sidebar {
            width: 300px;
            background: white;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #333;
            flex-shrink: 0;
        }
        .stats {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .stats-item {
            margin-bottom: 6px;
        }
        .stats-item:last-child {
            margin-bottom: 0;
        }
        .stats-item strong {
            color: #333;
        }
        #locations-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .city-section {
            margin-bottom: 16px;
        }
        .city-title {
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .location-item {
            padding: 10px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
            -webkit-user-select: none;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .location-item:active {
            background-color: #e8e8e8;
        }
        .location-item:hover {
            background-color: #f0f0f0;
        }
        .location-item.visited {
            color: #FBCA12;
            font-weight: 600;
        }
        .location-item.unvisited {
            color: #666;
        }
        .location-item.new {
            color: #FBCA12;
            font-weight: 600;
        }
        .status-badge {
            display: inline-block;
            margin-right: 6px;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        /* Mobile styles */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #map {
                order: 2;
                flex: 1;
                min-height: 0;
            }
            .sidebar {
                order: 1;
                width: 100%;
                max-height: 40vh;
                border-bottom: 1px solid #e0e0e0;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                padding: 12px;
            }
            .sidebar h2 {
                font-size: 16px;
                margin-bottom: 8px;
            }
            .stats {
                padding: 10px;
                margin-bottom: 12px;
                font-size: 12px;
            }
            .city-title {
                font-size: 11px;
                margin-bottom: 6px;
            }
            .location-item {
                padding: 8px 6px;
                margin-bottom: 2px;
                font-size: 12px;
                min-height: 40px;
            }
        }
        
        /* iPhone specific */
        @supports (padding: max(0px)) {
            .sidebar {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-bottom: max(16px, env(safe-area-inset-bottom));
            }
            @media (max-width: 768px) {
                .sidebar {
                    padding-left: max(12px, env(safe-area-inset-left));
                    padding-right: max(12px, env(safe-area-inset-right));
                    padding-bottom: max(12px, env(safe-area-inset-bottom));
                }
            }
        }
        
        /* Leaflet touch fixes */
        .leaflet-container {
            font-size: 16px;
        }
        .leaflet-popup-content {
            font-size: 14px;
            margin: 0;
        }
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <a href="/" style="font-size:0.8em;color:#666;text-decoration:none;display:block;margin-bottom:8px;">← Home</a>
            <h2>Mohoe Coffee</h2>
            <div class="stats">
                <div class="stats-item"><strong>Visited:</strong> <span id="visited-count">10</span>/25</div>
                <div class="stats-item"><strong>Remaining:</strong> <span id="remaining-count">15</span></div>
            </div>
            <div id="locations-list"></div>
        </div>
    </div>

    <script>
        // Initialize map
        const map = L.map('map', {
            zoomControl: true,
            touchZoom: true,
            doubleClickZoom: true,
            scrollWheelZoom: true
        }).setView([-39.13, 177.71], 5);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const locations = {
            Wellington: [
                { name: 'Mojo Airport', lat: -41.3302555, lng: 174.8112968, visited: true, date: '2025-04-22' },
                { name: 'Mojo Atrium', lat: -41.3088882, lng: 174.78024073264186, visited: false },
                { name: 'Mojo Aurora', lat: -41.28095375, lng: 174.77463842494112, visited: false },
                { name: 'Mojo Bowen', lat: -41.2782275, lng: 174.7749621, visited: true, date: '2025-02-03' },
                { name: 'Mojo Brandon', lat: -41.2835488, lng: 174.7774388, visited: true, date: '2025-02-24' },
                { name: 'Mojo Central', lat: -41.2873166, lng: 174.775592, visited: true, date: '2025-01-13' },
                { name: 'Mojo CSB Hospital', lat: -41.3095758, lng: 174.7780857, visited: false, new: true },
                { name: 'Mojo Express', lat: -41.2877809, lng: 174.775322, visited: true, date: '2025-01-13' },
                { name: 'Mojo Featherston', lat: -41.2800147, lng: 174.7792808, visited: true, date: '2025-04-22' },
                { name: 'Mojo Old Bank', lat: -41.2858613, lng: 174.77624173047525, visited: true, date: '2025-01-16' },
                { name: 'Mojo State', lat: -41.2867081, lng: 174.7763177, visited: true, date: '2025-01-15' },
                { name: 'Mojo Summit', lat: -41.2729276, lng: 174.778072, visited: false },
                { name: 'Mojo Tahi', lat: -41.2792641, lng: 174.7759010162606, visited: true, date: '2025-03-01' },
                { name: 'Mojo Terrace', lat: -41.2831236, lng: 174.7749322, visited: false },
                { name: 'Mojo Wakefield', lat: -41.3166702, lng: 174.7782206, visited: false },
                { name: 'The Beanery by Mojo', lat: -41.2806013, lng: 174.775054, visited: false, new: true }
            ],
            Auckland: [
                { name: 'Mojo Albert', lat: -36.8464218, lng: 174.7646047, visited: true, date: '2025-03-05' },
                { name: 'Mojo AUT', lat: -36.8532194, lng: 174.7673188, visited: false, new: true },
                { name: 'Mojo Fanshawe', lat: -36.8463158, lng: 174.757656, visited: false },
                { name: 'Mojo Little Quay', lat: -36.8430427, lng: 174.765275, visited: true, date: '2025-05-02' },
                { name: 'Mojo Quay', lat: -36.8431578, lng: 174.7653159, visited: false, new: true },
                { name: 'Mojo Vulcan Lane', lat: -36.847243481470784, lng: 174.76720162032652, visited: false },
                { name: 'Mojo Wyndham', lat: -36.8466984, lng: 174.76281, visited: false },
                { name: 'Mojo Wynyard', lat: -36.8445627, lng: 174.7549833, visited: false }
            ],
            Christchurch: [
                { name: 'Mojo Cashel', lat: -43.533344799999995, lng: 172.6318274481211, visited: false }
            ]
        };

        // Add markers to map
        Object.entries(locations).forEach(([city, locs]) => {
            locs.forEach(loc => {
                const icon = L.icon({
                    iconUrl: loc.visited ? 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIgZmlsbD0iIzI3YWU2MCIvPjwvc3ZnPg==' : 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIgZmlsbD0iIzk5OTkiLz48L3N2Zz4=',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
                const popupText = loc.visited ? `<strong>${loc.name}</strong><br>✅ Visited: ${loc.date}` : `<strong>${loc.name}</strong><br>⏳ Not visited`;
                marker.bindPopup(popupText);
            });
        });

        // Build sidebar
        const listContainer = document.getElementById('locations-list');
        Object.entries(locations).forEach(([city, locs]) => {
            const cityDiv = document.createElement('div');
            cityDiv.className = 'city-section';
            
            const cityTitle = document.createElement('div');
            cityTitle.className = 'city-title';
            cityTitle.textContent = city;
            cityDiv.appendChild(cityTitle);

            locs.forEach(loc => {
                const item = document.createElement('div');
                let className = `location-item ${loc.visited ? 'visited' : 'unvisited'}`;
                if (loc.new) className += ' new';
                item.className = className;
                const badge = loc.visited ? '✅' : (loc.new ? '🆕' : '⏳');
                item.innerHTML = `<span class="status-badge">${badge}</span> ${loc.name}`;
                item.onclick = () => {
                    map.setView([loc.lat, loc.lng], 15);
                    // Close sidebar on mobile after selection
                    if (window.innerWidth <= 768) {
                        // Sidebar stays visible but map is focused
                    }
                };
                cityDiv.appendChild(item);
            });

            listContainer.appendChild(cityDiv);
        });

        // Handle window resize for responsive layout
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });
    </script>
</body>
</html>
