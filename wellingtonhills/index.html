<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Wellington Hills</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<style>
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
		}
		#map {
			height: 100%;
			width: 100%;
		}
		#title {
			position: absolute;
			top: 10px;
			left: 50px;
			z-index: 1000;
			background-color: #fff;
			font-family: sans-serif;
			font-size: 1.4em;
			font-weight: 600;
			padding: 5px 10px;
			border-radius: 4px;
			box-shadow: 0 1px 5px rgba(0,0,0,0.3);
		}
		#home-link {
			position: absolute;
			top: 10px;
			left: 10px;
			z-index: 1000;
			background-color: #fff;
			font-family: sans-serif;
			font-size: 1em;
			padding: 5px 8px;
			border-radius: 4px;
			box-shadow: 0 1px 5px rgba(0,0,0,0.3);
			text-decoration: none;
			color: #333;
		}
		#home-link:hover { color: #000; }
	</style>
</head>
<body>

<div id="map"></div>
<a id="home-link" href="/">←</a>
<div id="title">Wellington Hills</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
	var map = L.map('map').setView([-41.259173, 174.866319], 11);

	L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
		maxZoom: 17,
		attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
	}).addTo(map);

	var hills = [
	  ["Matiu/Somes Island",     74,  -41.259173,    174.866319,    false],
	  ["Spinnaker Summit",       98,  -41.1086,       174.88595,    false],
	  ["Botanic Gardens",       121,  -41.28525,      174.76748,    false],
	  ["Mt Victoria",           196,  -41.296187,     174.796257,   false],
	  ["Tinakori Hill",         303,  -41.27413,      174.763641,   false],
	  ["Cannon Point",          345,  -41.1033333,    175.0730556,  false],
	  ["Brooklyn Wind Turbine", 373,  -41.3111,       174.7449,     false],
	  ["Makara Peak",           412,  -41.2891667,    174.7069444,  false],
	  ["Mt Kaukau",             431,  -41.2341667,    174.7797222,  false],
	  ["Boulder Hill",          442,  -41.1522222,    174.9372222,  false],
	  ["Belmont Trig",          457,  -41.1833333,    174.8738889,  false],
	  ["Colonial Knob",         458,  -41.1552778,    174.8036111,  false],
	  ["Hawkins Hill",          495,  -41.3291667,    174.7258333,  false],
	  ["Rimutaka Trig",         725,  -41.1188889,    175.23,       false],
	  ["Mount Climie",          860,  -41.1502778,    175.1433333,  false],
	  ["Rocky Lookout",         602,  -40.902902,     175.453757,   "26/04/2025"],
	  ["Rimutaka Summit",       365,  -41.14271931,   175.19782662, false],
	  ["Blue Ridge Hut",        966,  -40.7955106,    175.5109285,  false],
	  ["Centre of New Zealand", 899,  -41.018216,     175.362283,   false]
	];

	hills.forEach(function(hill) {
		var done = hill[4];
		var marker = L.circleMarker([hill[2], hill[3]], {
			radius: 8,
			fillColor: done ? "#27ae60" : "#e74c3c",
			color: "#fff",
			weight: 2,
			opacity: 1,
			fillOpacity: 0.9
		}).addTo(map);

		marker.bindPopup(
			"<strong>" + hill[0] + "</strong> (" + hill[1] + "m)<br>" +
			(done ? "Done on " + done : "Haven't done it yet...")
		);
	});
</script>

</body>
</html>
